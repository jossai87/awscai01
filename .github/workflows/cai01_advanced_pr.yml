name: CAI01 Advanced - Deploy Beta Lambda + Synthesize

on:
  pull_request:
    branches:
      - main
    paths:
      - 'CAI_01/advanced/**'

jobs:
  deploy-beta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Package Lambda
        run: |
          cd CAI_01/advanced/lambda
          zip -r ../../../beta_lambda.zip handler.py

      - name: Deploy Beta Lambda
        run: |
          aws lambda update-function-code \
            --function-name PollyTextToSpeech_Beta \
            --zip-file fileb://beta_lambda.zip

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name PollyTextToSpeech_Beta

      - name: Invoke Beta via API Gateway
        run: |
          curl -sf -X POST "${{ secrets.BETA_API_ENDPOINT }}/synthesize" \
            -H "Content-Type: application/json" \
            -d '{"text": "This is from a Lambda."}'
