name: Upload Prompt Config to S3

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'CAI_04/foundational/prompts/**.json'

jobs:
  upload-prompt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=beta" >> $GITHUB_OUTPUT
          fi

      - name: Upload prompt templates to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_BETA }}
        run: |
          for f in CAI_04/foundational/prompt_templates/*.txt; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            aws s3 cp "$f" "s3://${S3_BUCKET}/prompt_templates/${filename}"
            echo "Uploaded template: $filename"
          done

      - name: Upload prompt configs to S3 with env metadata
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_BETA }}
          ENV: ${{ steps.env.outputs.env }}
        run: |
          for f in CAI_04/foundational/prompts/*.json; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            aws s3 cp "$f" "s3://${S3_BUCKET}/prompt_inputs/${filename}" \
              --metadata "env=${ENV}"
            echo "Uploaded config: $filename with env=${ENV}"
          done
