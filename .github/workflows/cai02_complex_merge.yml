name: CAI02 Complex - Rekognition Prod - Deploy IaC + Upload + Validate

on:
  push:
    branches:
      - main
    paths:
      - 'CAI_02/complex/**'
      - 'CAI_02/foundational/images/**'

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Prod CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file CAI_02/complex/cloudformation/template.yml \
            --stack-name rekognition-prod-stack \
            --parameter-overrides Env=prod S3BucketName=${{ secrets.S3_BUCKET }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Get Prod Lambda ARN
        id: get-prod-arn
        run: |
          ARN=$(aws cloudformation describe-stacks \
            --stack-name rekognition-prod-stack \
            --query "Stacks[0].Outputs[?OutputKey=='LambdaArn'].OutputValue" \
            --output text)
          echo "prod_lambda_arn=$ARN" >> $GITHUB_OUTPUT

      - name: Deploy Lambda code
        run: |
          cd CAI_02/complex/lambda
          zip handler.zip handler.py
          aws lambda update-function-code \
            --function-name rekognition-prod-handler \
            --zip-file fileb://handler.zip
          aws lambda wait function-updated \
            --function-name rekognition-prod-handler

      - name: Configure S3 event notifications
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          BETA_LAMBDA_ARN: ${{ secrets.BETA_LAMBDA_ARN }}
          PROD_LAMBDA_ARN: ${{ steps.get-prod-arn.outputs.prod_lambda_arn }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: python CAI_02/complex/cloudformation/configure_s3_notifications.py

      - name: Upload images to S3 (prod prefix)
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          for img in CAI_02/foundational/images/*.jpg CAI_02/foundational/images/*.png; do
            [ -f "$img" ] || continue
            filename=$(basename "$img")
            aws s3 cp "$img" "s3://${S3_BUCKET}/rekognition-input/prod/${filename}"
            echo "Uploaded $filename"
          done

      - name: Validate - poll DynamoDB for results
        env:
          DYNAMODB_TABLE: ${{ secrets.DYNAMODB_TABLE_PROD }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python - <<'EOF'
          import boto3, time, os, sys

          table_name = os.environ["DYNAMODB_TABLE"]
          dynamo     = boto3.resource("dynamodb", region_name=os.environ["AWS_REGION"])
          table      = dynamo.Table(table_name)

          print(f"Polling {table_name} for Lambda results (up to 60s)...")
          for attempt in range(12):
              items = table.scan(Limit=5).get("Items", [])
              if items:
                  print(f"Validation passed: {len(items)} record(s) found.")
                  for item in items:
                      print(f"  {item.get('filename')} — {len(item.get('labels', []))} labels")
                  sys.exit(0)
              print(f"  Waiting... ({attempt + 1}/12)")
              time.sleep(5)

          print("Validation failed: no records found after 60s.")
          sys.exit(1)
          EOF
